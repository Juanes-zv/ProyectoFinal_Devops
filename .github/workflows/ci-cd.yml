name: DevOps CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar Linter (Flake8)
      run: |
        flake8 . --statistics

    - name: Ejecutar Pruebas Unitarias (Pytest)
      run: |
        PYTHONPATH=. pytest tests/

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo fuente
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      uses: uses/docker-setup-buildx-action@v3

    - name: Validar construccion de imagen Multi-stage
      run: |
        docker build -t todo-api:latest .
